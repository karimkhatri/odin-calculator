<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="main">
        <div class="calculator">
            <div class="container">
                <div class="row">
                    <div class="box screen">
                        <div class="box previous-screen"></div>
                        <div class="box current-screen"></div>
                    </div>
                </div>
                <div class="row">
                    <button class="box clear">Clear</button>
                    <button class="box delete">Delete</button>
                </div>
                <div class="row">
                    <button class="box number">7</button>
                    <button class="box number">8</button>
                    <button class="box number">9</button>
                    <button class="box operator">÷</button>
                </div>
                <div class="row">
                    <button class="box number">4</button>
                    <button class="box number">5</button>
                    <button class="box number">6</button>
                    <button class="box operator">×</button>
                </div>
                <div class="row">
                    <button class="box number">1</button>
                    <button class="box number">2</button>
                    <button class="box number">3</button>
                    <button class="box operator">-</button>
                </div>
                <div class="row">
                    <button class="box decimal">.</button>
                    <button class="box number">0</button>
                    <button class="box equal">=</button>
                    <button class="box operator">+</button>
                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
